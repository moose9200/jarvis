version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis-dev-pw}
    volumes:
      - jarvis_pg:/var/lib/postgresql/data
    # No host port — talk to it via compose network as `postgres:5432`.
    # To inspect from host: `docker compose exec postgres psql -U jarvis jarvis`
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No host port — `redis:6379` inside compose network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD:-jarvis-dev-pw}@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A worker worker --loglevel=info --concurrency=2
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD:-jarvis-dev-pw}@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery beat — single-instance scheduler. Drives intel.run_due every 10 min
  # plus any other periodic tasks declared in worker.celery_app.conf.beat_schedule.
  # IMPORTANT: only ONE beat container should ever run, otherwise jobs duplicate.
  beat:
    build: ./backend
    command: celery -A worker beat --loglevel=info
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD:-jarvis-dev-pw}@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Override per environment: VITE_API_BASE=https://api.yourdomain.com docker compose build
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jarvis_pg:
